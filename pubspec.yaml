name: smart_task_planner
description: A production-ready cross-platform task planner for Windows and Android.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.1

  # Supabase (Backend + Realtime + Auth)
  supabase_flutter: ^2.5.6

  # Local Database (Offline Support)
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Calendar
  table_calendar: ^3.1.2

  # UI & UX
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  flex_color_scheme: ^8.4.0
  phosphor_flutter: ^2.1.0

  # Date & Time
  intl: ^0.20.2

  # Forms & Validation
  reactive_forms: ^17.0.1

  # Connectivity & Offline
  connectivity_plus: ^6.0.3

  # Shared Preferences
  shared_preferences: ^2.2.3

  # JSON
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Utilities
  uuid: ^4.4.2
  rxdart: ^0.27.7
  dartz: ^0.10.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Charts & Stats
  fl_chart: ^0.68.0

  # PDF Export
  pdf: ^3.10.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
